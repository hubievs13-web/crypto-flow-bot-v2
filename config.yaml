symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT

timeframes:
  entry: 15m
  context: 1h
  macro: 4h

binance:
  base_url: https://fapi.binance.com
  timeout_seconds: 10.0
  kline_limit: 300
  derivatives_data_limit: 100

telegram:
  enabled: true
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID

logging:
  level: INFO
  jsonl_path: logs/rfa-events.jsonl

risk:
  min_risk_reward: 1.5
  atr_stop_multiplier: 1.5
  atr_tp_multipliers: [1.5, 2.5, 4.0]
  trailing_atr_multiplier: 1.0
  max_position_minutes: 240
  cooldown_minutes: 60

rfa_engine:
  min_signal_confidence: 70
  watch_confidence: 60
  strong_signal_confidence: 85
  require_context_alignment: true
  require_macro_alignment: true

market_regime:
  enabled: true
  mode: scoring_layer
  fail_open: true
  low_confidence_behavior: no_adjustment
  min_confidence_for_adjustment: 0.65
  max_positive_adjustment: 3
  max_negative_adjustment: 4
  apply_bonus_only_if_base_score_at_least: 68

signal_governor:
  enabled: true
  max_signals_per_scan: 2
  max_signals_per_hour: 4
  per_symbol_cooldown_minutes: 90
  same_direction_cluster_limit: 2
  ranking:
    primary: final_score
    secondary: risk_reward
    tertiary: volume_confirmation

candidate_engine:
  enabled: true
  min_candidate_score: 0.65
  signal_threshold: 0.80
  candidate_ttl_minutes: 120
  min_maturity_ticks: 2
  max_maturity_bonus: 0.05
  max_candidates_total: 100
  max_candidates_per_symbol: 2
  hard_filters_required: true

calibration:
  enabled: false
  objective: risk_adjusted_pnl
  min_trades: 1
  drawdown_penalty: 1.0
  max_trials: 100
  min_signal_confidence_values: [70, 75, 80, 85]
  min_risk_reward_values: [1.5, 2.0, 2.5]
  atr_stop_multiplier_values: [1.0, 1.5, 2.0]
  trailing_atr_multiplier_values: [0.8, 1.0, 1.2]
  cooldown_minutes_values: [30, 60, 120]
