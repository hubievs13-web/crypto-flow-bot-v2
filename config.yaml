symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT

timeframes:
  entry: 15m
  context: 1h
  macro: 4h

binance:
  base_url: https://fapi.binance.com
  timeout_seconds: 10.0
  kline_limit: 300
  derivatives_data_limit: 100

telegram:
  enabled: false
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID

logging:
  level: INFO
  jsonl_path: logs/rfa-events.jsonl

risk:
  min_risk_reward: 1.5
  atr_stop_multiplier: 1.5
  atr_tp_multipliers: [1.5, 2.5, 4.0]
  trailing_atr_multiplier: 1.0
  max_position_minutes: 240
  cooldown_minutes: 60

rfa_engine:
  min_signal_confidence: 70
  watch_confidence: 60
  strong_signal_confidence: 85
  require_context_alignment: true
  require_macro_alignment: true

calibration:
  enabled: false
  objective: risk_adjusted_pnl
  min_trades: 1
  drawdown_penalty: 1.0
  max_trials: 100
  min_signal_confidence_values: [70, 75, 80, 85]
  min_risk_reward_values: [1.5, 2.0, 2.5]
  atr_stop_multiplier_values: [1.0, 1.5, 2.0]
  trailing_atr_multiplier_values: [0.8, 1.0, 1.2]
  cooldown_minutes_values: [30, 60, 120]
